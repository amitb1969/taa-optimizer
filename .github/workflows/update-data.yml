name: Update TAA Data

on:
  schedule:
    # 23:30 UTC Mon–Fri (≈ 7:30pm ET, after US close)
    - cron: '30 23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch prices & rebuild taa_data.json
        run: python taa_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add taa_data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh taa_data.json"
            git push
          fi
